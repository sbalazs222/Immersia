services: 
  backend:
    user: root
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - apps/backend/.env
    restart: unless-stopped
    volumes:
      - data:/data
   
  nginx:
    image: nginx:alpine
    volumes:
      - data:/data:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: 
      - 80:80


volumes:
  data: